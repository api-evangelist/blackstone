    name: Blackstone Investor Portal
    description: >-
      Blackstone provides institutional and individual investors with access to portfolio
      information, capital account statements, fund documents, and reporting through its
      Investor Portal. API integrations may be available for institutional investors and
      data aggregation platforms under direct agreement with Blackstone.
