  - type: Features
    data:
      - name: Investor Portal
        description: >-
          Web-based portal providing investors with access to fund performance,
          capital account statements, distributions, and investor documents.
      - name: Fund Reporting
        description: >-
          Quarterly and annual fund-level reporting including audited financials,
          NAV calculations, and investor-level P&L attribution.
      - name: Alternative Data Integration
        description: >-
          Blackstone's data science and technology teams develop proprietary data
          products and integrations to support portfolio company operations and
          investment research.
      - name: Portfolio Company Technology
        description: >-
          Blackstone actively supports portfolio companies in technology transformation,
          digital infrastructure buildout, and enterprise software adoption.
      - name: Capital Call and Distribution Notices
        description: >-
          Automated delivery of capital call and distribution notices to investors
          via the portal, email, and data feed integrations.
      - name: Tax Document Delivery
        description: >-
          Annual K-1 and other tax documents delivered electronically to limited
          partners through the Investor Portal.
  - type: UseCases
    data:
      - name: Institutional Investor Reporting
        description: >-
          Institutional LPs access fund reporting, capital call and distribution notices,
          and tax documents through the investor portal or via data integrations.
      - name: Portfolio Monitoring
        description: >-
          Blackstone's investment teams use proprietary data platforms to monitor
          portfolio company performance metrics, market signals, and risk indicators.
      - name: Data Aggregation
        description: >-
          Third-party data aggregators and institutional investor platforms may
          access Blackstone investor data via direct data feed agreements.
      - name: Wealth Management Distribution
        description: >-
          Registered investment advisors and wealth managers access Blackstone
          alternative products through platform integrations for accredited investor clients.
  - type: Integrations
    data:
      - name: iCapital Network
        description: >-
          Blackstone distributes alternative investments to wealth management clients
          through iCapital Network's feeder fund and technology platform.
      - name: CAIS
        description: >-
          Blackstone alternative investment products are available through the
          CAIS platform for independent and institutional advisors.
      - name: Yardi
        description: >-
          Blackstone Real Estate uses Yardi for property management, accounting,
          and data reporting across its real estate portfolio.
      - name: Allvue Systems
        description: >-
          Blackstone's credit and private equity operations use Allvue for portfolio
          monitoring, investor reporting, and fund accounting.
