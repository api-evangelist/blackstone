name: Blackstone
description: >-
  Blackstone is the world's largest alternative asset manager with over $1 trillion in
  assets under management across private equity, real estate, credit, and hedge fund
  strategies. Blackstone serves institutional investors including pension funds, sovereign
  wealth funds, endowments, and foundations, as well as accredited individual investors
  through its private wealth solutions. Technology and data platforms are central to
  Blackstone's investment operations and portfolio company management.
